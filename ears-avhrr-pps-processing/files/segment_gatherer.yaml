patterns:
  ears-avhrr-pps:
    pattern:
      "W_XX-EUMETSAT-Darmstadt,SING+LEV+SAT,{platform_name}+{segment}_C_EUMS_{start_time:%Y%m%d%H%M%S}_{orbit:5d}.nc"
    critical_files: ":CMA,:CT,:CTTH"
    wanted_files: ":CMA,:CT,:CTTH"
    all_files: ":CMA,:CT,:CTTH"

timeliness: 120
time_name: start_time

check_existing_files_after_start: true

posttroll:
  topics:
    - /segment/ears_avhrr_pps
  publish_topic:
    /dataset/ears_avhrr_pps
  addresses:
    - tcp://trollstalker-ears-avhrr-pps:10000
  nameservers: false
  publish_port: 10001
